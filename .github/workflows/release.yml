name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update changelog and status
        run: |
          node scripts/update-changelog.js ${{ inputs.version }}
          node scripts/update-status.js ${{ inputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md status.json
          git commit -m "chore: release ${{ inputs.version }}" || echo "No changelog changes"
          git push

      - name: Create tag
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Extract release notes
        run: |
          node scripts/release-notes.js ${{ inputs.version }} > release-notes.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body_path: release-notes.txt

      - name: Email release notes
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Snake release ${{ inputs.version }}"
          to: "abmsam1234@gmail.com"
          from: "Snake CI <${{ secrets.SMTP_USER }}>"
          body: |
            Release ${{ inputs.version }} is live.

            Notes:
            $(cat release-notes.txt)
