name: Screenshot Regression

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tools
        run: |
          npm install -g playwright@1.44.0 pixelmatch@5.3.0 pngjs@7.0.0
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: node scripts/screenshot.js

      - name: Ensure baseline
        id: baseline
        run: |
          if [ ! -f artifacts/baseline/home.png ]; then
            mkdir -p artifacts/baseline
            cp artifacts/home.png artifacts/baseline/home.png
            cp artifacts/playing.png artifacts/baseline/playing.png
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add artifacts/baseline/home.png artifacts/baseline/playing.png
            git commit -m "chore: add screenshot baseline" || echo "No baseline changes"
            git push
            echo "baseline_created=true" >> $GITHUB_OUTPUT
          else
            echo "baseline_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Compare screenshots
        if: steps.baseline.outputs.baseline_created != 'true'
        run: node scripts/compare-screens.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts
