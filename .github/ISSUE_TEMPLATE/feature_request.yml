name: Feature request
about: Suggest a feature
labels: enhancement

body:
  - type: textarea
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives
      description: Alternative ideas
    validations:
      required: false
